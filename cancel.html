<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drafthaus — Upgrade Cancelled</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0b0d12;
      color: #e8e6e0;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #13151e;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .wordmark {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }
    .wordmark span { color: #f5c842; }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.05);
      border: 2px solid #2a2d3a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #e8e6e0;
    }
    p {
      font-size: 12px;
      color: #888;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #f5c842;
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-ghost {
      display: inline-block;
      background: none;
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 12px 28px;
      text-decoration: none;
      transition: color 0.15s;
    }
    .btn-ghost:hover { color: #e8e6e0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Draft<span>haus</span></div>
    <div class="icon">✕</div>
    <h1>No worries.</h1>
    <p>Your upgrade was cancelled and you haven't been charged. Your free account is still active — come back whenever you're ready.</p>
    <a href="https://drafthaus.ca" class="btn">Back to Drafthaus →</a>
    <br>
    <a href="https://drafthaus.ca" class="btn-ghost">Maybe later</a>
  </div>
</body>
</html>
