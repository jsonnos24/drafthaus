<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smooth Guitar Tuner</title>
<style>
body { margin:0; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#f0f0f0; }
#tuner-container { width:90vw; max-width:400px; }
canvas { width:100%; height:auto; }
#note { font-size:6vw; text-align:center; }
#detune { font-size:4vw; text-align:center; }
#strings { font-size:4vw; text-align:center; }
.active { color: green; font-weight:bold; }
button { font-size:5vw; padding:1vh 2vw; margin-top:2vh; }
</style>
</head>
<body>

<h2>Guitar Tuner</h2>
<div id="tuner-container">
<canvas id="gauge" width="400" height="400"></canvas>
</div>
<div id="note">-</div>
<div id="detune"></div>
<div id="strings">E A D G B e</div>
<button id="start">Start</button>

<script>
const noteNames=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const stringNotes=['E2','A2','D3','G3','B3','E4'];
const stringNames=['E','A','D','G','B','e'];

let audioContext, analyser, dataArray;
let needleAngle=0;
let detuneHistory=[];
const maxHistory=15;

const canvas=document.getElementById('gauge');
const ctx=canvas.getContext('2d');
const cx=200, cy=200, radius=150;
const maxAngle=70;

document.getElementById('start').onclick=async()=>{
  audioContext=new (window.AudioContext||window.webkitAudioContext)();
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  const source=audioContext.createMediaStreamSource(stream);
  analyser=audioContext.createAnalyser();
  source.connect(analyser);
  analyser.fftSize=2048;
  dataArray=new Float32Array(analyser.fftSize);
  requestAnimationFrame(update);
};

function autoCorrelate(buf,sampleRate){
  let SIZE=buf.length,rms=0;
  for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.01) return -1;
  let r=new Array(SIZE).fill(0);
  for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE-i;j++) r[i]+=buf[j]*buf[j+i];
  let d=0; while(r[d]>r[d+1]) d++;
  let maxval=-1,maxpos=-1;
  for(let i=d;i<SIZE;i++) if(r[i]>maxval){maxval=r[i];maxpos=i;}
  return sampleRate/maxpos;
}

function freqToNote(freq){
  let noteNum=12*Math.log2(freq/440)+69;
  let rounded=Math.round(noteNum);
  let detune=freq-(440*Math.pow(2,(rounded-69)/12));
  return {name:noteNames[rounded%12],detune};
}

function stringToFreq(note){
  let octave=parseInt(note.slice(-1));
  let n=noteNames.indexOf(note.slice(0,-1));
  return 440*Math.pow(2,(n+(octave-4)*12-9)/12);
}

function closestString(freq){
  let min=Infinity,idx=0;
  for(let i=0;i<stringNotes.length;i++){
    let f=stringToFreq(stringNotes[i]);
    let diff=Math.abs(freq-f);
    if(diff<min){min=diff;idx=i;}
  }
  return idx;
}

function draw(angle,detune){
  ctx.clearRect(0,0,400,400);

  // arcs
  for(let i=-maxAngle;i<=maxAngle;i++){
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    let rad=(i-90)*Math.PI/180;
    let x=cx+radius*Math.cos(rad);
    let y=cy+radius*Math.sin(rad);
    ctx.lineTo(x,y);

    if(Math.abs(detune)<0.5) ctx.strokeStyle='green';
    else if(Math.abs(detune)<1) ctx.strokeStyle='lightgreen';
    else if(Math.abs(detune)<2) ctx.strokeStyle='yellow';
    else ctx.strokeStyle='red';

    ctx.stroke();
  }

  // needle
  ctx.beginPath();
  let rad=(angle-90)*Math.PI/180;
  let nx=cx+(radius-20)*Math.cos(rad);
  let ny=cy+(radius-20)*Math.sin(rad);
  ctx.moveTo(cx,cy);
  ctx.lineTo(nx,ny);
  ctx.lineWidth=5;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx,cy,6,0,Math.PI*2);
  ctx.fill();
}

function update(){
  analyser.getFloatTimeDomainData(dataArray);
  let freq=autoCorrelate(dataArray,audioContext.sampleRate);

  if(freq!==-1){
    const note=freqToNote(freq);

    document.getElementById('note').innerText=note.name;
    document.getElementById('detune').innerText=(note.detune>0?'Sharp ':'Flat ')+note.detune.toFixed(2)+' Hz';

    // smoothing
    detuneHistory.push(note.detune);
    if(detuneHistory.length>maxHistory) detuneHistory.shift();
    let avg=detuneHistory.reduce((a,b)=>a+b,0)/detuneHistory.length;

    // deadzone
    if(Math.abs(avg)<0.2) avg=0;

    let target=Math.max(-maxAngle,Math.min(maxAngle,(avg/1.5)*maxAngle));

    // slower needle (key change)
    needleAngle += (target - needleAngle) * 0.05;

    draw(needleAngle,avg);

    let idx=closestString(freq);
    document.getElementById('strings').innerHTML =
      stringNames.map((s,i)=>i===idx?`<span class="active">${s}</span>`:s).join(' ');
  }

  requestAnimationFrame(update);
}
</script>
</body>
</html>
