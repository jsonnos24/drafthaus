<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>Drafthaus Lite</title>

<!-- Shared Firebase project with full Drafthaus (same auth + data) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
/* ───────────────────────── Design tokens (iOS / macOS) ───────────────────────── */
:root {
  --bg:        #f2f2f7;   /* grouped background */
  --bg-elev:   #ffffff;   /* cards / sheets */
  --bg-input:  #e3e3e8;
  --sep:       #d6d6da;   /* hairline separators */
  --sep-soft:  #ececef;
  --text:      #1c1c1e;
  --text-2:    #8e8e93;   /* secondary label */
  --text-3:    #c4c4c6;   /* tertiary / chevrons */
  --tint:      #007aff;   /* iOS blue */
  --tint-bg:   #e7f0ff;
  --red:       #ff3b30;
  --orange:    #ff9500;
  --green:     #34c759;
  --nav-bg:    rgba(249,249,249,0.92);
  --shadow:    0 1px 4px rgba(0,0,0,0.06);
  --shadow-lg: 0 14px 40px rgba(0,0,0,0.18);
  --radius:    14px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font: -apple-system, "SF Pro Text", BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
}
html.dark {
  --bg:        #000000;
  --bg-elev:   #1c1c1e;
  --bg-input:  #2c2c2e;
  --sep:       #38383a;
  --sep-soft:  #2c2c2e;
  --text:      #f2f2f7;
  --text-2:    #98989f;
  --text-3:    #5a5a5e;
  --tint:      #0a84ff;
  --tint-bg:   #16243a;
  --red:       #ff453a;
  --orange:    #ff9f0a;
  --green:     #30d158;
  --nav-bg:    rgba(28,28,30,0.86);
  --shadow:    0 1px 4px rgba(0,0,0,0.4);
  --shadow-lg: 0 14px 40px rgba(0,0,0,0.55);
}

* , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
  transition: background .25s ease, color .25s ease;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }
.hidden { display: none !important; }

/* ───────────────────────── Landing / auth overlay ───────────────────────── */
#landing {
  position: fixed; inset: 0; z-index: 1000;
  background: linear-gradient(160deg, #0a0a0c 0%, #1a1a2e 60%, #16213e 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px calc(24px + env(safe-area-inset-right,0)) calc(24px + var(--safe-bottom)) calc(24px + env(safe-area-inset-left,0));
  color: #fff;
}
#landing .brand { text-align: center; margin-bottom: 36px; }
#landing .brand .logo {
  font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
  display: inline-flex; align-items: center; gap: 10px;
}
#landing .brand .lite {
  font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--orange); margin-top: 6px;
}
#landing .brand .tag { color: rgba(255,255,255,0.55); font-size: 14px; margin-top: 10px; }

.auth-card {
  width: 100%; max-width: 360px;
  display: flex; flex-direction: column; gap: 10px;
}
.auth-btn {
  width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: transform .08s ease, opacity .15s ease;
}
.auth-btn:active { transform: scale(0.98); }
.auth-btn.google { background: #fff; color: #1c1c1e; }
.auth-btn.primary { background: var(--tint); color: #fff; }
.auth-btn.ghost { background: rgba(255,255,255,0.10); color: #fff; }
.auth-divider { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.4); font-size: 13px; margin: 6px 0; }
.auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.15); }
.auth-field {
  width: 100%; padding: 14px; border-radius: 12px; font-size: 16px;
  background: rgba(255,255,255,0.10); color: #fff; border: 1px solid rgba(255,255,255,0.14);
}
.auth-field::placeholder { color: rgba(255,255,255,0.45); }
.auth-toggle { text-align: center; color: rgba(255,255,255,0.75); font-size: 14px; margin-top: 4px; }
.auth-toggle b { color: var(--orange); font-weight: 700; }
.auth-error { color: #ff8a80; font-size: 13px; text-align: center; min-height: 18px; }
#emailForm { display: flex; flex-direction: column; gap: 10px; }

/* ───────────────────────── App shell ───────────────────────── */
#app { display: none; min-height: 100%; }
body.signed-in #app { display: block; }
body.signed-in #landing { display: none; }

/* generic large-title nav (song list) */
.lg-title {
  font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
  padding: calc(14px + var(--safe-top)) 16px 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.lg-title .add { color: var(--tint); font-size: 30px; font-weight: 300; line-height: 1; }
.searchbar {
  margin: 6px 16px 12px; background: var(--bg-input); border-radius: 10px;
  padding: 8px 12px; display: flex; align-items: center; gap: 8px; color: var(--text-2); font-size: 16px;
}
.searchbar input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 16px; }

/* song list */
.sl-section { font-size: 12px; font-weight: 800; color: var(--text-2); text-transform: uppercase; letter-spacing: .6px; margin: 8px 18px 6px; }
.sl-group { margin: 0 12px 16px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: var(--bg-elev); }
.sl-row { position: relative; overflow: hidden; }
.sl-row + .sl-row { border-top: .5px solid var(--sep-soft); }
.sl-card {
  position: relative; z-index: 2; background: var(--bg-elev);
  padding: 12px 14px; display: flex; align-items: center; gap: 12px;
  transition: transform .22s cubic-bezier(.2,.8,.2,1); touch-action: pan-y;
}
.sl-card .tile {
  width: 44px; height: 44px; border-radius: 9px; flex: none;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 18px; position: relative;
}
.sl-card .pin-badge { position: absolute; top: -5px; right: -5px; font-size: 12px; filter: drop-shadow(0 1px 1px rgba(0,0,0,.3)); }
.sl-card .meta { flex: 1; min-width: 0; }
.sl-card .nm { font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sl-card .sub { font-size: 12.5px; color: var(--text-2); margin-top: 2px; }
.sl-card .grip, .sl-card .chev { color: var(--text-3); font-size: 18px; flex: none; }
.sl-actions { position: absolute; top: 0; right: 0; bottom: 0; display: flex; z-index: 1; }
.sl-actions button { width: 76px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: #fff; font-size: 12px; font-weight: 700; }
.sl-actions .act-pin { background: var(--orange); }
.sl-actions .act-del { background: var(--red); }
.sl-empty { text-align: center; color: var(--text-2); font-size: 15px; padding: 60px 30px; line-height: 1.6; }

/* color picker popover */
.popover-backdrop { position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; padding: 24px; }
.popover { background: var(--bg-elev); border-radius: 16px; box-shadow: var(--shadow-lg); padding: 16px; width: 100%; max-width: 280px; }
.popover h4 { font-size: 15px; font-weight: 700; text-align: center; margin-bottom: 14px; color: var(--text); }
.swatches { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
.swatch { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
.swatch.sel { outline: 3px solid var(--text); outline-offset: 2px; }

/* toast */
#toast { position: fixed; left: 50%; bottom: calc(28px + var(--safe-bottom)); transform: translateX(-50%) translateY(20px);
  background: rgba(40,40,44,0.95); color: #fff; padding: 11px 18px; border-radius: 22px; font-size: 14px; font-weight: 600;
  opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 2000; backdrop-filter: blur(10px); }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.spinner { width: 28px; height: 28px; border: 3px solid rgba(127,127,127,.25); border-top-color: var(--tint); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.center-load { display: flex; align-items: center; justify-content: center; min-height: 60vh; }

/* Desktop inline delete (touch devices use swipe-to-delete instead) */
.sl-del-desktop, .take-del-desktop { display: none; align-items: center; justify-content: center; flex: none; color: var(--text-3); }
.sl-del-desktop { width: 34px; height: 34px; border-radius: 8px; margin-left: 2px; }
.take-del-desktop { width: 30px; height: 30px; }
.sl-del-desktop:hover, .take-del-desktop:hover { color: var(--red); }
.sl-del-desktop:hover { background: rgba(255,59,48,.10); }
.sl-del-desktop svg, .take-del-desktop svg { width: 18px; height: 18px; }
@media (hover: hover) and (pointer: fine) {
  .sl-del-desktop, .take-del-desktop { display: flex; }
}

/* ───────────────────────── Screen routing ───────────────────────── */
.screen { display: none; }
.screen.active { display: block; }

/* ───────────────────────── Song (lyrics) screen ───────────────────────── */
/* Gate display on .active so the .screen{display:none} rule isn't lost to ID specificity */
#screen-song, #screen-qc, #screen-fc { height: 100vh; height: 100dvh; }
#screen-song.active, #screen-qc.active, #screen-fc.active { display: flex; flex-direction: column; }
.song-nav {
  height: calc(50px + var(--safe-top)); padding: var(--safe-top) 8px 0;
  display: flex; align-items: center; gap: 6px;
  background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: .5px solid var(--sep); flex: none; z-index: 5;
}
.song-nav .icon-btn { width: 40px; height: 40px; border-radius: 10px; font-size: 22px; color: var(--tint); display: flex; align-items: center; justify-content: center; }
.song-nav .title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px; }
.song-body { flex: 1; display: flex; min-height: 0; position: relative; }

/* lyrics editor */
#lyricsEditor {
  flex: 1; overflow-y: auto; padding: 18px 16px 40vh; outline: none;
  font-size: 16px; line-height: 1.7; color: var(--text); -webkit-overflow-scrolling: touch;
}
#lyricsEditor:empty::before { content: attr(data-placeholder); color: var(--text-3); }
#lyricsEditor div { min-height: 1.2em; }

/* recording rail */
.rail {
  width: 52px; flex: none; background: var(--bg-elev); border-left: .5px solid var(--sep);
  display: flex; flex-direction: column; align-items: center; padding: 12px 0 calc(14px + var(--safe-bottom));
  gap: 10px; z-index: 6;
}
.rec-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--red); border: 3px solid var(--bg-elev); outline: 2px solid var(--red); flex: none; transition: border-radius .18s ease, transform .1s ease; }
.rec-btn:active { transform: scale(.92); }
.rec-btn.recording { border-radius: 9px; outline-offset: 0; animation: recpulse 1.4s ease-in-out infinite; }
@keyframes recpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,59,48,.5); } 50% { box-shadow: 0 0 0 7px rgba(255,59,48,0); } }
.rail .timer { font-size: 10px; color: var(--text-2); font-variant-numeric: tabular-nums; min-height: 12px; }
.rail .pt-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--tint); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; flex: none; }
.rail .pt-btn.disabled { background: var(--bg-input); color: var(--text-3); }
.rail .divider { width: 28px; height: .5px; background: var(--sep); flex: none; }
.rail .takes-btn {
  writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
  font-size: 12px; font-weight: 700; color: var(--tint); background: var(--tint-bg);
  padding: 12px 7px; border-radius: 12px; margin-top: auto; flex: none; max-height: 50%;
  display: flex; align-items: center; justify-content: center; gap: 6px; overflow: hidden;
  white-space: nowrap;
}
.rail .takes-btn .tk-name { color: var(--text-2); font-weight: 600; max-height: 120px; overflow: hidden; text-overflow: ellipsis; }

/* takes panel (slides over lyrics) */
#takesPanel {
  position: absolute; top: 0; left: 0; bottom: 0; right: 52px; background: var(--bg-elev);
  box-shadow: -2px 0 20px rgba(0,0,0,.14); transform: translateX(calc(100% + 52px)); transition: transform .26s cubic-bezier(.2,.8,.2,1);
  display: flex; flex-direction: column; z-index: 7;
}
#takesPanel.open { transform: translateX(0); }
.tp-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 8px; flex: none; }
.tp-head h3 { font-size: 20px; font-weight: 700; color: var(--text); }
.tp-head .done { color: var(--tint); font-size: 16px; font-weight: 600; }
.boost-row { margin: 0 16px 8px; display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--bg); border-radius: 12px; flex: none; }
.boost-row .lab { flex: 1; font-weight: 700; font-size: 14px; color: var(--text); }
.boost-row .lab small { display: block; font-weight: 500; font-size: 11px; color: var(--text-2); margin-top: 1px; }
.toggle { width: 50px; height: 30px; border-radius: 16px; background: var(--bg-input); position: relative; flex: none; transition: background .2s ease; }
.toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.3); transition: transform .2s ease; }
.toggle.on { background: var(--green); }
.toggle.on::after { transform: translateX(20px); }
.tp-list { flex: 1; overflow-y: auto; padding: 2px 12px calc(16px + var(--safe-bottom)); }
.tp-empty { text-align: center; color: var(--text-2); font-size: 14px; padding: 40px 20px; }
.take-row { position: relative; overflow: hidden; border-radius: 14px; margin-bottom: 8px; }
.take-actions { position: absolute; top: 0; right: 0; bottom: 0; display: flex; z-index: 1; }
.take-actions button { width: 72px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: #fff; font-size: 12px; font-weight: 700; background: var(--red); }
.take-card { position: relative; z-index: 2; background: var(--bg); display: flex; align-items: center; gap: 11px; padding: 11px 12px; transition: transform .22s cubic-bezier(.2,.8,.2,1); touch-action: pan-y; }
.take-card.sel { background: var(--tint-bg); }
.take-card .play { width: 34px; height: 34px; border-radius: 50%; background: var(--tint); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; flex: none; }
.take-card.playing .play { background: var(--red); }
.take-card .meta { flex: 1; min-width: 0; }
.take-card .nm { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.take-card .nm[contenteditable] { outline: none; border-bottom: 1.5px solid var(--tint); white-space: normal; }
.take-card .sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.take-card .loop { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--text-3); flex: none; }
.take-card .loop.on { color: var(--green); }
.take-card .loop svg { width: 18px; height: 18px; }

/* menu sheet (bottom) */
#menuSheet { position: fixed; inset: 0; z-index: 1100; display: none; }
#menuSheet.open { display: block; }
#menuSheet .backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.3); opacity: 0; transition: opacity .25s ease; }
#menuSheet.open .backdrop { opacity: 1; }
.sheet {
  position: absolute; left: 0; right: 0; bottom: 0; background: var(--bg-elev);
  border-radius: 18px 18px 0 0; padding: 8px 0 calc(10px + var(--safe-bottom));
  transform: translateY(100%); transition: transform .28s cubic-bezier(.2,.85,.25,1);
  max-height: 80vh; overflow-y: auto;
}
#menuSheet.open .sheet { transform: translateY(0); }
.sheet-grab { width: 38px; height: 5px; border-radius: 3px; background: var(--sep); margin: 8px auto 6px; }
.sheet-item { display: flex; align-items: center; gap: 14px; padding: 15px 20px; border-top: .5px solid var(--sep-soft); font-size: 16px; color: var(--text); }
.sheet-item:first-of-type { border-top: none; }
.sheet-item .ic { width: 26px; text-align: center; font-size: 19px; }
.sheet-item .val { margin-left: auto; color: var(--text-2); font-size: 15px; display: flex; align-items: center; gap: 4px; }
.sheet-item .chev { color: var(--text-3); }

/* key picker list */
.key-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 6px 16px 16px; }
.key-opt { padding: 12px; border-radius: 10px; background: var(--bg); text-align: center; font-size: 15px; font-weight: 600; color: var(--text); }
.key-opt.sel { background: var(--tint); color: #fff; }
.sheet-back { display: flex; align-items: center; gap: 6px; color: var(--tint); font-size: 16px; font-weight: 600; padding: 10px 16px 4px; }

/* ───────────────────────── Chord screens (Quick Chords + Find a Chord) ───────────────────────── */
.chord-nav {
  height: calc(50px + var(--safe-top)); padding: var(--safe-top) 12px 0;
  display: flex; align-items: center; gap: 8px; flex: none;
  background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: .5px solid var(--sep);
}
.chord-nav .back-btn { color: var(--tint); font-size: 16px; font-weight: 600; flex: none; min-width: 54px; text-align: left; }
.chord-nav .t { flex: 1; text-align: center; font-size: 16px; font-weight: 700; color: var(--text); }
.chord-nav .key-pill { font-size: 13px; font-weight: 700; color: var(--tint); background: var(--tint-bg); padding: 6px 10px; border-radius: 16px; flex: none; }

.seg { display: flex; background: var(--bg-input); border-radius: 9px; padding: 2px; margin: 10px 14px; flex: none; }
.seg button { flex: 1; text-align: center; font-size: 14px; font-weight: 600; padding: 7px 0; border-radius: 7px; color: var(--text); background: none; }
.seg button.on { background: var(--bg-elev); box-shadow: 0 1px 3px rgba(0,0,0,.12); }
html.dark .seg button.on { background: #48484a; }

.fb-card { background: #1c140c; margin: 0 14px; border-radius: 14px; padding: 12px 10px 8px; box-shadow: var(--shadow); flex: none; }
.fb-chordname { text-align: center; color: #e0b450; font-size: 18px; font-weight: 800; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
.fb-card svg { display: block; margin: 0 auto; touch-action: manipulation; }

/* Quick Chords pills */
.qc-pills { flex: 1; overflow-y: auto; padding: 12px 12px calc(20px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }
.qc-grp { font-size: 11px; font-weight: 800; color: var(--text-2); text-transform: uppercase; letter-spacing: .6px; margin: 4px 2px 6px; }
.qc-cols { display: flex; gap: 4px; }
.qc-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.qc-ivl { font-size: 9px; color: var(--text-2); font-weight: 700; text-align: center; }
.qc-pill { border-radius: 8px; padding: 8px 2px; font-size: 13px; font-weight: 700; text-align: center; color: #fff;
  background: var(--tint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; transition: transform .07s ease; }
.qc-pill:active { transform: scale(.94); }
.qc-pill.alt { background: #1c1c1e; } html.dark .qc-pill.alt { background: #3a3a3c; }
.qc-pill.playing { box-shadow: 0 0 0 3px var(--tint-bg), 0 0 12px rgba(0,122,255,.5); }
.qc-var { background: var(--tint-bg); color: var(--tint); font-size: 11px; font-weight: 600; padding: 6px 2px; }
.qc-var.playing { box-shadow: 0 0 0 2px var(--tint); }
.qc-borrowed { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.qc-bpill { background: #fff4e5; color: #b25b00; border: 1px solid #ffe0b3; border-radius: 14px; padding: 6px 11px; font-size: 12px; font-weight: 600; }
html.dark .qc-bpill { background: #3a2a14; color: #ffb84d; border-color: #5a4424; }
.qc-bpill .lab { font-size: 9px; opacity: .7; margin-right: 4px; }
.qc-bpill.playing { box-shadow: 0 0 0 2px var(--orange); }

/* Find a Chord */
.fc-picker { display: flex; gap: 8px; margin: 0 14px 8px; flex: none; }
.fc-picker select { flex: 1; min-width: 0; background: var(--bg-elev); border: 1px solid var(--sep); border-radius: 10px; padding: 10px 12px; font-size: 15px; font-weight: 600; color: var(--text); -webkit-appearance: none; appearance: none; }
.fc-result { margin: 0 14px 8px; background: var(--bg-elev); border-radius: 14px; padding: 12px; text-align: center; box-shadow: var(--shadow); flex: none; }
.fc-result.close { background: #fff8ef; } html.dark .fc-result.close { background: #2a2114; }
.fc-result .big { font-size: 24px; font-weight: 800; color: var(--text); }
.fc-result.close .big { color: var(--orange); }
.fc-result .sub { font-size: 12px; color: var(--text-2); margin-top: 3px; }
.fc-actions { display: flex; gap: 10px; margin: 10px 14px calc(16px + var(--safe-bottom)); flex: none; }
.fc-act { flex: 1; text-align: center; padding: 12px 0; border-radius: 12px; font-size: 15px; font-weight: 700; }
.fc-act.play { background: var(--green); color: #fff; }
.fc-act.clear { background: var(--bg-elev); color: var(--red); border: 1px solid var(--sep); }
.fc-cell { cursor: pointer; }
</style>
</head>
<body>

<!-- ───────────────────────── Landing / auth ───────────────────────── -->
<div id="landing">
  <div class="brand">
    <div class="logo">🎵 Drafthaus</div>
    <div class="lite">Lite</div>
    <div class="tag">Record &amp; write. Your songs, everywhere.</div>
  </div>
  <div class="auth-card">
    <button class="auth-btn google" onclick="authGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider">or</div>
    <form id="emailForm" onsubmit="return authEmailSubmit(event)">
      <input class="auth-field" id="authEmail" type="email" placeholder="Email" autocomplete="email" required>
      <input class="auth-field" id="authPass" type="password" placeholder="Password" autocomplete="current-password" required>
      <div class="auth-error" id="authError"></div>
      <button class="auth-btn primary" id="authSubmitBtn" type="submit">Sign in</button>
    </form>
    <div class="auth-toggle" id="authToggle" onclick="authToggleMode()">
      New here? <b>Create an account</b>
    </div>
    <div class="auth-divider">or</div>
    <button class="auth-btn ghost" onclick="authGuest()">Continue as guest</button>
  </div>
</div>

<!-- ───────────────────────── App ───────────────────────── -->
<div id="app">
  <!-- Song list (home) -->
  <section id="screen-songlist" class="screen active">
    <div class="lg-title">Songs <button class="add" onclick="createSong()" aria-label="New song">＋</button></div>
    <div class="searchbar">🔍 <input id="songSearch" placeholder="Search" oninput="renderSongList()"></div>
    <div id="songListBody">
      <div class="center-load"><div class="spinner"></div></div>
    </div>
  </section>

  <!-- Song (lyrics + recording) -->
  <section id="screen-song" class="screen">
    <div class="song-nav">
      <button class="icon-btn" onclick="openMenu()" aria-label="Menu">☰</button>
      <div class="title" id="songTitle" onclick="renameSongPrompt()">Untitled</div>
      <button class="icon-btn" onclick="goHome()" aria-label="Back to songs" style="font-size:15px;font-weight:600;">Songs</button>
    </div>
    <div class="song-body">
      <div id="lyricsEditor" contenteditable="true" spellcheck="true"
           data-placeholder="Tap to write your lyrics…"
           oninput="onLyricsInput()" onblur="flushLyrics()"></div>

      <!-- takes panel -->
      <div id="takesPanel">
        <div class="tp-head"><h3>Takes</h3><button class="done" onclick="toggleTakes()">Done</button></div>
        <div class="boost-row">
          <div class="lab">⚡ Boost <small>Louder playback for quiet takes</small></div>
          <div class="toggle" id="boostToggle" onclick="toggleBoost()"></div>
        </div>
        <div class="tp-list" id="takesList"></div>
      </div>

      <!-- recording rail -->
      <div class="rail">
        <button class="rec-btn" id="recBtn" onclick="toggleRecord()" aria-label="Record"></button>
        <div class="timer" id="recTimer"></div>
        <div class="divider"></div>
        <button class="pt-btn disabled" id="playBtn" onclick="railPlayToggle()" aria-label="Play">▶</button>
        <button class="takes-btn" onclick="toggleTakes()">Takes ◂ <span class="tk-name" id="railTakeName">Empty</span></button>
      </div>
    </div>
  </section>

  <!-- Quick Chords -->
  <section id="screen-qc" class="screen">
    <div class="chord-nav">
      <button class="back-btn" onclick="showScreen('song')">‹ Back</button>
      <div class="t">Quick Chords</div>
      <button class="key-pill" id="qcKeyPill" onclick="qcOpenKeyPicker()">C major ▾</button>
    </div>
    <div class="seg" id="qcSeg">
      <button class="on" data-inst="guitar" onclick="qcSetInstrument('guitar')">Guitar</button>
      <button data-inst="ukulele" onclick="qcSetInstrument('ukulele')">Ukulele</button>
    </div>
    <div class="fb-card"><div class="fb-chordname" id="qcChordName">—</div><div id="qcNeck"></div></div>
    <div class="qc-pills" id="qcPills"></div>
  </section>

  <!-- Find a Chord -->
  <section id="screen-fc" class="screen">
    <div class="chord-nav">
      <button class="back-btn" onclick="showScreen('song')">‹ Back</button>
      <div class="t">Find a Chord</div>
      <span style="width:54px"></span>
    </div>
    <div class="seg" id="fcSeg">
      <button class="on" data-inst="guitar" onclick="fcSetInstrument('guitar')">Guitar</button>
      <button data-inst="ukulele" onclick="fcSetInstrument('ukulele')">Ukulele</button>
    </div>
    <div class="fc-picker">
      <select id="fcRoot" onchange="fcSelectFromDropdown()"></select>
      <select id="fcQual" onchange="fcSelectFromDropdown()"></select>
    </div>
    <div class="fc-result" id="fcResult"><div class="big" id="fcResultName">Tap notes on the neck</div><div class="sub" id="fcResultSub">…or pick a chord above</div></div>
    <div class="fb-card"><div id="fcNeck"></div></div>
    <div class="fc-actions">
      <button class="fc-act play" onclick="fcPlay()">▶ Play</button>
      <button class="fc-act clear" onclick="fcClear()">Clear fretboard</button>
    </div>
  </section>
</div>

<!-- ☰ Menu sheet -->
<div id="menuSheet">
  <div class="backdrop" onclick="closeMenu()"></div>
  <div class="sheet" id="menuSheetInner"></div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════ Firebase (shared with full Drafthaus) ═══════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAkQOyqAA0E_vw9Xdgz9LIG5C0ZwGAmgFc",
  authDomain:        "drafthaus-ca18c.firebaseapp.com",
  projectId:         "drafthaus-ca18c",
  storageBucket:     "drafthaus-ca18c.firebasestorage.app",
  messagingSenderId: "1010933852221",
  appId:             "1:1010933852221:web:c45dfa51bf597955182254",
  measurementId:     "G-9DK5WR93W4"
};
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});
const db = firebase.firestore();
try { db.settings({ experimentalForceLongPolling: true }); } catch(e) {}

function uid() { return auth.currentUser ? auth.currentUser.uid : null; }

/* ═══════════════════════════ Toast ═══════════════════════════ */
let _toastTimer = null;
function toast(msg, ms) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms || 1800);
}

/* ═══════════════════════════ Auth ═══════════════════════════ */
let _authMode = 'signin'; // 'signin' | 'signup'

function authToggleMode() {
  _authMode = (_authMode === 'signin') ? 'signup' : 'signin';
  document.getElementById('authSubmitBtn').textContent = _authMode === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('authToggle').innerHTML = _authMode === 'signin'
    ? 'New here? <b>Create an account</b>'
    : 'Already have an account? <b>Sign in</b>';
  document.getElementById('authPass').setAttribute('autocomplete', _authMode === 'signin' ? 'current-password' : 'new-password');
  document.getElementById('authError').textContent = '';
}

function _authErr(e) {
  const map = {
    'auth/invalid-email': 'That email doesn\'t look right.',
    'auth/user-not-found': 'No account with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/invalid-credential': 'Email or password is incorrect.',
    'auth/email-already-in-use': 'That email already has an account — try signing in.',
    'auth/weak-password': 'Password should be at least 6 characters.',
    'auth/popup-closed-by-user': '',
    'auth/network-request-failed': 'Network error — check your connection.',
  };
  const m = map[e && e.code];
  document.getElementById('authError').textContent = (m !== undefined) ? m : (e && e.message ? e.message : 'Something went wrong.');
}

function authGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(_authErr);
}
function authEmailSubmit(ev) {
  ev.preventDefault();
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  document.getElementById('authError').textContent = '';
  const p = (_authMode === 'signin')
    ? auth.signInWithEmailAndPassword(email, pass)
    : auth.createUserWithEmailAndPassword(email, pass);
  p.catch(_authErr);
  return false;
}
function authGuest() { auth.signInAnonymously().catch(_authErr); }
function signOut() { auth.signOut(); }

/* ═══════════════════════════ Song data ═══════════════════════════ */
const TILE_COLORS = [
  ['#007aff','#34c759'], ['#ff9500','#ff3b30'], ['#5856d6','#af52de'],
  ['#34c759','#30b0c7'], ['#ff2d55','#ff9500'], ['#8e8e93','#636366'],
];
let _songs = [];          // local cache of the user's song docs
let _songsLoaded = false;  // false until the first songs snapshot resolves
let _songsUnsub = null;

function _tileGradient(song) {
  const idx = (typeof song.tileColor === 'number') ? song.tileColor
            : _autoColorIdx(song.id || song.title || '');
  const c = TILE_COLORS[idx % TILE_COLORS.length];
  return `linear-gradient(135deg, ${c[0]}, ${c[1]})`;
}
function _autoColorIdx(seed) {
  let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  return h % TILE_COLORS.length;
}
function _relTime(ms) {
  if (!ms) return 'never';
  const d = (typeof ms === 'object' && ms.toDate) ? ms.toDate() : new Date(ms);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000), hrs = Math.floor(diff / 3600000), days = Math.floor(diff / 86400000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  if (hrs < 24) return hrs + 'h ago';
  if (days === 1) return 'yesterday';
  if (days < 7) return days + ' days ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function startSongsListener() {
  if (_songsUnsub) { _songsUnsub(); _songsUnsub = null; }
  const u = uid();
  if (!u) return;
  _songsUnsub = db.collection('songs').where('ownerId', '==', u)
    .onSnapshot(snap => {
      _songs = [];
      snap.forEach(doc => {
        const d = doc.data();
        if (d.trashed) return;
        _songs.push(Object.assign({ id: doc.id }, d));
      });
      _songsLoaded = true;
      _fetchTakeCounts(_songs.map(s => s.id));
      renderSongList();
    }, err => {
      console.warn('[songs] snapshot error', err);
      document.getElementById('songListBody').innerHTML =
        '<div class="sl-empty">Couldn\'t load songs.<br>' + (err.code || '') + '</div>';
    });
}

let _takeCounts = {};   // songId -> count
async function _fetchTakeCounts(ids) {
  if (!ids.length) return;
  try {
    for (let i = 0; i < ids.length; i += 10) {
      const chunk = ids.slice(i, i + 10);
      const snap = await db.collection('voice_takes').where('songId', 'in', chunk).get();
      chunk.forEach(id => { _takeCounts[id] = 0; });
      snap.forEach(doc => { const sid = doc.data().songId; _takeCounts[sid] = (_takeCounts[sid] || 0) + 1; });
    }
    renderSongList();
  } catch (e) { /* permission noise in guest mode is fine */ }
}

function _sortedSongs() {
  const q = (document.getElementById('songSearch')?.value || '').trim().toLowerCase();
  let list = _songs.slice();
  if (q) list = list.filter(s => (s.title || '').toLowerCase().includes(q));
  const pinned = list.filter(s => s.pinned).sort((a, b) => (a.pinOrder || 0) - (b.pinOrder || 0));
  const rest   = list.filter(s => !s.pinned).sort((a, b) => _ms(b.updatedAt) - _ms(a.updatedAt));
  return { pinned, rest };
}
function _ms(v) { return (v && v.toDate) ? v.toDate().getTime() : (v || 0); }

function renderSongList() {
  const body = document.getElementById('songListBody');
  if (!_songsLoaded) {
    body.innerHTML = '<div class="center-load"><div class="spinner"></div></div>';
    return;
  }
  if (!_songs.length) {
    body.innerHTML = '<div class="sl-empty">No songs yet.<br>Tap ＋ to start your first one.</div>';
    return;
  }
  const { pinned, rest } = _sortedSongs();
  let html = '';
  if (pinned.length) {
    html += '<div class="sl-section">📌 Pinned</div><div class="sl-group">' + pinned.map(s => _songRow(s, true)).join('') + '</div>';
  }
  if (rest.length) {
    if (pinned.length) html += '<div class="sl-section">Recent</div>';
    html += '<div class="sl-group">' + rest.map(s => _songRow(s, false)).join('') + '</div>';
  }
  if (!pinned.length && !rest.length) {
    html = '<div class="sl-empty">No matches.</div>';
  }
  body.innerHTML = html;
}

function _songRow(s, isPinned) {
  const initial = (s.title || '·').trim().charAt(0).toUpperCase() || '·';
  const takes = _takeCounts[s.id];
  const takeStr = (takes === undefined) ? '…' : (takes === 0 ? 'no takes' : takes + (takes === 1 ? ' take' : ' takes'));
  const sub = takeStr + ' · ' + _relTime(s.updatedAt);
  return `
    <div class="sl-row" data-id="${s.id}">
      <div class="sl-actions">
        <button class="act-pin" onclick="togglePin('${s.id}', event)">📌<span>${isPinned ? 'Unpin' : 'Pin'}</span></button>
        <button class="act-del" onclick="deleteSong('${s.id}', event)">🗑<span>Delete</span></button>
      </div>
      <div class="sl-card" onclick="openSong('${s.id}')">
        <div class="tile" style="background:${_tileGradient(s)}" onclick="openColorPicker('${s.id}', event)">
          ${initial}${isPinned ? '<span class="pin-badge">📌</span>' : ''}
        </div>
        <div class="meta"><div class="nm">${_esc(s.title || 'Untitled')}</div><div class="sub">${sub}</div></div>
        <span class="${isPinned ? 'grip' : 'chev'}">${isPinned ? '≡' : '›'}</span>
        <button class="sl-del-desktop" onclick="deleteSong('${s.id}', event)" title="Delete song" aria-label="Delete song">${TRASH_SVG}</button>
      </div>
    </div>`;
}
function _esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const TRASH_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>';

/* ── Song actions ── */
async function createSong() {
  const u = uid(); if (!u) return;
  const now = Date.now();
  const ref = db.collection('songs').doc();
  const song = { id: ref.id, ownerId: u, title: 'Untitled', key: '', lyricsDoc: '',
                 createdAt: now, updatedAt: now, sharedWith: [], sharedReadOnly: [] };
  try { await ref.set(song, { merge: true }); _songs.unshift(song); _openSongObj(song); }
  catch (e) { toast('Could not create song'); console.warn(e); }
}

async function togglePin(id, ev) {
  if (ev) ev.stopPropagation();
  const s = _songs.find(x => x.id === id); if (!s) return;
  const willPin = !s.pinned;
  const maxOrder = Math.max(0, ..._songs.filter(x => x.pinned).map(x => x.pinOrder || 0));
  try {
    await db.collection('songs').doc(id).set({ pinned: willPin, pinOrder: willPin ? maxOrder + 1 : 0 }, { merge: true });
    _closeSwipe();
  } catch (e) { toast('Could not update pin'); }
}

async function deleteSong(id, ev) {
  if (ev) ev.stopPropagation();
  const s = _songs.find(x => x.id === id);
  if (!confirm('Delete "' + (s?.title || 'this song') + '"? This also removes its takes.')) { _closeSwipe(); return; }
  try {
    await db.collection('songs').doc(id).set({ trashed: true, trashedAt: Date.now() }, { merge: true });
    toast('Moved to trash');
  } catch (e) { toast('Could not delete'); }
}

/* ── Color picker ── */
let _colorTargetId = null;
function openColorPicker(id, ev) {
  if (ev) ev.stopPropagation();
  _colorTargetId = id;
  const s = _songs.find(x => x.id === id);
  const cur = (typeof s.tileColor === 'number') ? s.tileColor : _autoColorIdx(s.id || s.title || '');
  const back = document.createElement('div');
  back.className = 'popover-backdrop';
  back.onclick = (e) => { if (e.target === back) back.remove(); };
  back.innerHTML = '<div class="popover"><h4>Tile color</h4><div class="swatches">' +
    TILE_COLORS.map((c, i) => `<div class="swatch ${i === cur ? 'sel' : ''}" style="background:linear-gradient(135deg,${c[0]},${c[1]})" onclick="pickColor(${i})"></div>`).join('') +
    '</div></div>';
  document.body.appendChild(back);
}
async function pickColor(idx) {
  document.querySelector('.popover-backdrop')?.remove();
  if (!_colorTargetId) return;
  try { await db.collection('songs').doc(_colorTargetId).set({ tileColor: idx }, { merge: true }); }
  catch (e) { toast('Could not set color'); }
}

/* ═══════════════════════════ Screen routing ═══════════════════════════ */
let _currentSong = null;      // working copy of the open song
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}
function openSong(id) {
  const s = _songs.find(x => x.id === id);
  if (s) _openSongObj(s);
}
function _openSongObj(s) {
  _currentSong = Object.assign({}, s);
  _loadedTakeId = null; _selectNewest = false; _loopTakes = new Set();
  document.getElementById('songTitle').textContent = s.title || 'Untitled';
  document.getElementById('lyricsEditor').innerHTML = ilSanitizeDocHtml(ilGetDocHtml(s));
  document.getElementById('takesPanel').classList.remove('open');
  updateBoostUI();
  startTakesListener(s.id);
  showScreen('song');
  // Warm the chord-audio sampler now so it's ready before the user ever opens
  // a chord screen (eliminates the brief synth-fallback on the first pill tap).
  try { loadSampler(_qcInstrument); } catch (e) {}
}
function goHome() {
  flushLyrics(); stopPlayback(); stopTakesListener();
  _currentSong = null;
  showScreen('songlist');
}

/* ═══════════════════════════ Lyrics (reuses Drafthaus lyricsDoc machinery) ═══════════════════════════ */
const esc = _esc;
const PARTS = {
  'intro':{label:'Intro',color:'#5cb85c'},'verse-1':{label:'Verse 1',color:'#6aabee'},
  'verse-2':{label:'Verse 2',color:'#5596d8'},'verse-3':{label:'Verse 3',color:'#4282c2'},
  'verse-4':{label:'Verse 4',color:'#3070ad'},'pre-chorus':{label:'Pre-Chorus 1',color:'#b794f4'},
  'pre-chorus-2':{label:'Pre-Chorus 2',color:'#9e7ae0'},'pre-chorus-3':{label:'Pre-Chorus 3',color:'#8460cb'},
  'chorus-1':{label:'Chorus 1',color:'#ff6b8a'},'chorus-2':{label:'Chorus 2',color:'#e8527a'},
  'chorus-3':{label:'Chorus 3',color:'#d1406a'},'post-chorus':{label:'Post-Chorus',color:'#f5a623'},
  'bridge':{label:'Bridge',color:'#4dc9b0'},'breakdown':{label:'Breakdown',color:'#40d0d0'},
  'hook':{label:'Hook',color:'#ff80b0'},'solo':{label:'Solo',color:'#ff7070'},
  'instrumental':{label:'Instrumental',color:'#ff9500'},'outro':{label:'Outro',color:'#6aabee'},
};
function _prettyId(id) { return String(id).replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

function ilSanitizeDocHtml(html) {
  if (!html) return '';
  const tpl = document.createElement('template');
  tpl.innerHTML = String(html);
  const ALLOWED_TAGS = new Set(['B','I','U','STRONG','EM','SPAN','DIV','BR','H1','H2','H3','P','FONT']);
  const ALLOWED_STYLE = ['color','background-color','background','font-size','font-family','font-weight','font-style','text-decoration'];
  const walk = (node) => {
    for (const el of Array.from(node.childNodes)) {
      if (el.nodeType === Node.COMMENT_NODE) { el.remove(); continue; }
      if (el.nodeType !== Node.ELEMENT_NODE) continue;
      if (!ALLOWED_TAGS.has(el.tagName)) { while (el.firstChild) node.insertBefore(el.firstChild, el); el.remove(); continue; }
      for (const attr of Array.from(el.attributes)) {
        const n = attr.name.toLowerCase();
        if (n === 'class') continue;
        if (n === 'color' || n === 'face' || n === 'size') continue;

  document.querySelectorAll('#qcSeg button').forEach(b => b.classList.toggle('on', b.dataset.inst === _qcInstrument));
  document.getElementById('qcChordName').textContent = _qcSelected ? _qcSelected.replace('_viii','') : '—';
  const nStr = _qcInstrument === 'guitar' ? 6 : 4;
  const model = _qcSelected ? fbGetVoicing(_qcInstrument, _qcSelected) : null;
  document.getElementById('qcNeck').innerHTML = _fbNeckSVG(model, nStr);
  const names = seqGetScaleChords(km.key, km.mode);
  const IVL = ['I','II','III','IV','V','VI','VII','VIII'];
  let cols = '<div class="qc-cols">';
  names.forEach((name, idx) => {
    const clean = name.replace('_viii','');
    const root = (clean.length >= 2 && clean[1] === '#') ? clean.slice(0,2) : clean[0];
    const qual = clean.slice(root.length);
    const variants = (QUAL_VARIANTS[qual] || []).map(s => root + s);
    const alt = (qual === 'm' || qual === 'dim') ? 'alt' : '';
    cols += '<div class="qc-col"><div class="qc-ivl">' + IVL[idx] + '</div>';
    cols += '<div class="qc-pill ' + alt + (_qcSelected === name ? ' playing' : '') + '" onclick="qcPlayPill(\'' + name + '\')">' + clean + '</div>';
    variants.forEach(v => { cols += '<div class="qc-pill qc-var' + (_qcSelected === v ? ' playing' : '') + '" onclick="qcPlayPill(\'' + v + '\')">' + v + '</div>'; });
    cols += '</div>';
  });
  cols += '</div>';
  let bor = '';
  const borrowed = getBorrowedChords(km.key, km.mode);
  if (borrowed && borrowed.length) {
    bor = '<div class="qc-grp" style="margin-top:12px">Borrowed</div><div class="qc-borrowed">';
    borrowed.forEach(b => { bor += '<div class="qc-bpill' + (_qcSelected === b.name ? ' playing' : '') + '" onclick="qcPlayPill(\'' + b.name + '\')"><span class="lab">' + (b.label || '') + '</span>' + b.name + '</div>'; });
    bor += '</div>';
  }
  document.getElementById('qcPills').innerHTML = '<div class="qc-grp">Diatonic + variations</div>' + cols + bor;
}
function qcPlayPill(name) { _qcSelected = name; playChordOnInstrument(name, _qcInstrument); qcRender(); }

/* ═══════════════════════════ Find a Chord screen (reverse lookup) ═══════════════════════════ */
const FC_QUALS = [
  {s:'',l:'Major'},{s:'m',l:'Minor'},{s:'7',l:'7'},{s:'maj7',l:'Maj7'},{s:'m7',l:'m7'},
  {s:'sus2',l:'Sus2'},{s:'sus4',l:'Sus4'},{s:'add9',l:'Add9'},{s:'6',l:'6th'},{s:'m6',l:'Min6'},
  {s:'dim',l:'Dim'},{s:'dim7',l:'Dim7'},{s:'m7b5',l:'m7♭5'},{s:'5',l:'5 (power)'},
];
const _QUAL_RANK = {'':0,'m':1,'7':2,'5':2,'maj7':3,'m7':4,'dim':4,'6':5,'dim7':5,'sus2':6,'sus4':6,'m6':6,'m7b5':6,'add9':7,'msus4':7,'m9':8,'madd9':9,'dimM7':12};
function _qualRank(q) { return (q in _QUAL_RANK) ? _QUAL_RANK[q] : 6; }
let _fcInstrument = (function(){ try { return localStorage.getItem('dh-lite-fc-inst') || 'guitar'; } catch(e){ return 'guitar'; } })();
let _fcPlaced = [];
let _fcBase = 0;
function fcInitPlaced() { _fcPlaced = new Array(_FB_TUNING[_fcInstrument].length).fill(null); }
function openFindChord() { if (_fcPlaced.length !== _FB_TUNING[_fcInstrument].length) fcInitPlaced(); fcRender(); showScreen('fc'); loadSampler(_fcInstrument); }
function fcSetInstrument(inst) { _fcInstrument = inst; try { localStorage.setItem('dh-lite-fc-inst', inst); } catch(e){} fcInitPlaced(); _fcBase = 0; fcRender(); loadSampler(inst); }
function fcRender() {
  document.querySelectorAll('#fcSeg button').forEach(b => b.classList.toggle('on', b.dataset.inst === _fcInstrument));
  const rs = document.getElementById('fcRoot'), qs = document.getElementById('fcQual');
  if (rs && !rs.options.length) rs.innerHTML = '<option value="">Root…</option>' + SEQ_NOTES.map(n => '<option value="' + n + '">' + n + '</option>').join('');
  if (qs && !qs.options.length) qs.innerHTML = '<option value="-1">Type…</option>' + FC_QUALS.map((q, i) => '<option value="' + i + '">' + q.l + '</option>').join('');
  fcUpdate();
}
function fcTapCell(r, f) { _fcPlaced[r] = (_fcPlaced[r] === f) ? null : f; fcUpdate(); }
function fcSelectFromDropdown() {
  const root = document.getElementById('fcRoot').value, qi = parseInt(document.getElementById('fcQual').value, 10);
  if (!root || isNaN(qi) || qi < 0) return;
  const model = fbGetVoicing(_fcInstrument, root + FC_QUALS[qi].s);
  fcInitPlaced(); let maxF = 0;
  if (model && model.strings) model.strings.forEach((s, i) => { const f = (s.fret == null ? null : s.fret); _fcPlaced[i] = f; if (f && f > maxF) maxF = f; });
  const nz = (model.strings || []).map(s => s.fret).filter(f => f && f > 0);
  _fcBase = (maxF <= 5) ? 0 : Math.min(...nz);
  fcUpdate();
}
function fcClear() { fcInitPlaced(); _fcBase = 0; const rs = document.getElementById('fcRoot'), qs = document.getElementById('fcQual'); if (rs) rs.value = ''; if (qs) qs.value = '-1'; fcUpdate(); }
function fcPlacedMidis() { const t = _FB_TUNING[_fcInstrument]; const out = []; _fcPlaced.forEach((f, i) => { if (f != null) out.push(t[i] + f); }); return out; }
function fcPlacedPcs() { return fcPlacedMidis().map(m => ((m % 12) + 12) % 12); }
function fcBassPc() { const ms = fcPlacedMidis(); return ms.length ? (((Math.min(...ms) % 12) + 12) % 12) : -1; }
function fcPlay() { const ms = fcPlacedMidis(); if (!ms.length) { toast('Tap some notes first'); return; } playNotesStrum(ms.slice().sort((a, b) => a - b), _fcInstrument); }
function fcUpdate() {
  fcRenderNeck();
  const pcs = fcPlacedPcs();
  const res = document.getElementById('fcResult'), nameEl = document.getElementById('fcResultName'), subEl = document.getElementById('fcResultSub');
  if (!pcs.length) { res.classList.remove('close'); nameEl.textContent = 'Tap notes on the neck'; subEl.textContent = '…or pick a chord above'; return; }
  const id = identifyChord(pcs, fcBassPc());
  const noteNames = [...new Set(pcs)].map(pc => SEQ_NOTES[pc]).join(' · ');
  if (id.exact) { res.classList.remove('close'); nameEl.textContent = id.name; subEl.textContent = noteNames; }
  else { res.classList.add('close'); nameEl.textContent = 'Close to ' + id.name; subEl.textContent = noteNames; }
}
function identifyChord(pcs, bassPc) {
  const uniq = [...new Set(pcs)];
  if (!uniq.length) return null;
  if (uniq.length === 1) return { exact: true, name: SEQ_NOTES[uniq[0]] + ' (single note)' };
  const played = new Set(uniq);
  let exact = [], near = [];
  for (let root = 0; root < 12; root++) {
    for (const qual in _CHORD_INTERVALS) {
      const chordPcs = [...new Set(_CHORD_INTERVALS[qual].map(iv => (root + iv) % 12))];
      const chordSet = new Set(chordPcs);
      const matched = chordPcs.filter(pc => played.has(pc)).length;
      const missing = chordPcs.length - matched;
      const extra = uniq.filter(pc => !chordSet.has(pc)).length;
      const name = SEQ_NOTES[root] + qual;
      const rootBass = (root === bassPc);
      if (missing === 0 && extra === 0 && chordSet.size === played.size) exact.push({ name, size: chordPcs.length, rootBass, rank: _qualRank(qual) });
      else near.push({ name, score: matched * 3 - missing * 2 - extra * 2 + (rootBass ? 1 : 0) - _qualRank(qual) * 0.1 });
    }
  }
  if (exact.length) { exact.sort((a, b) => (b.rootBass - a.rootBass) || (b.size - a.size) || (a.rank - b.rank)); return { exact: true, name: exact[0].name }; }
  near.sort((a, b) => b.score - a.score);
  return { exact: false, name: near[0].name };
}
function fcRenderNeck() {
  const tuning = _FB_TUNING[_fcInstrument], nStr = tuning.length;
  const COLS = 5, COLW = 46, OPENW = 32, NUTX = 12 + OPENW, ROWGAP = 26, TOP = 24;
  const neckRight = NUTX + COLS * COLW, bottom = TOP + (nStr - 1) * ROWGAP, W = neckRight + 14, H = bottom + 34, base = _fcBase || 0;
  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" height="' + Math.min(H, 240) + '" style="display:block">';
  svg += '<rect x="'+NUTX+'" y="'+(TOP-7)+'" width="'+(COLS*COLW)+'" height="'+((nStr-1)*ROWGAP+14)+'" fill="#241a12" rx="3"/>';
  if (base === 0) svg += '<rect x="'+(NUTX-4)+'" y="'+(TOP-7)+'" width="6" height="'+((nStr-1)*ROWGAP+14)+'" fill="#cfcfdf"/>';
  else svg += '<text x="'+(NUTX-8)+'" y="'+(TOP-10)+'" fill="#e0b450" font-size="11" font-weight="700" text-anchor="end">'+base+'fr</text>';
  for (let c = 1; c <= COLS; c++) { const fx = NUTX + c * COLW; svg += '<line x1="'+fx+'" y1="'+(TOP-7)+'" x2="'+fx+'" y2="'+(bottom+7)+'" stroke="#5a4a38" stroke-width="2"/>'; }
  for (let c = 0; c < COLS; c++) { const absF = (base === 0 ? c + 1 : base + c); if ([3,5,7,9].includes(absF)) { const cx = NUTX + (c + 0.5) * COLW; svg += '<circle cx="'+cx+'" cy="'+((TOP+bottom)/2)+'" r="5" fill="#3a2c1c"/>'; } }
  for (let r = 0; r < nStr; r++) { const y = TOP + r * ROWGAP; svg += '<line x1="'+(NUTX-OPENW)+'" y1="'+y+'" x2="'+neckRight+'" y2="'+y+'" stroke="#8a8a9a" stroke-width="1.3"/>'; }
  for (let c = 0; c < COLS; c++) { const nx = NUTX + (c + 0.5) * COLW; svg += '<text x="'+nx+'" y="'+(bottom+22)+'" fill="#6a6a7a" font-size="10" text-anchor="middle">'+(base === 0 ? c + 1 : base + c)+'</text>'; }
  for (let r = 0; r < nStr; r++) { const y = TOP + r * ROWGAP; svg += '<text x="14" y="'+(y+4)+'" fill="#9a9aae" font-size="10" font-weight="700" text-anchor="middle">'+SEQ_NOTES[((tuning[r]%12)+12)%12]+'</text>'; }
  _fcPlaced.forEach((f, r) => { if (f == null) return; const y = TOP + r * ROWGAP;
    if (f === 0) svg += '<circle cx="'+(NUTX-OPENW/2)+'" cy="'+y+'" r="8" fill="none" stroke="#7aa2ff" stroke-width="2.5"/>';
    else { const col = (base === 0 ? f - 1 : f - base); if (col >= 0 && col < COLS) { const cx = NUTX + (col + 0.5) * COLW; svg += '<circle cx="'+cx+'" cy="'+y+'" r="10" fill="#e0b450"/>'; } }
  });
  for (let r = 0; r < nStr; r++) { const y = TOP + r * ROWGAP;
    svg += '<rect class="fc-cell" x="'+(NUTX-OPENW)+'" y="'+(y-ROWGAP/2)+'" width="'+OPENW+'" height="'+ROWGAP+'" fill="transparent" onclick="fcTapCell('+r+',0)"/>';
    for (let c = 0; c < COLS; c++) { const absF = (base === 0 ? c + 1 : base + c); svg += '<rect class="fc-cell" x="'+(NUTX+c*COLW)+'" y="'+(y-ROWGAP/2)+'" width="'+COLW+'" height="'+ROWGAP+'" fill="transparent" onclick="fcTapCell('+r+','+absF+')"/>'; }
  }
  document.getElementById('fcNeck').innerHTML = svg + '</svg>';
}

/* ═══════════════════════════ Swipe-to-reveal (song rows) ═══════════════════════════ */
let _swipeEl = null, _swipeStartX = 0, _swipeStartY = 0, _swipeOpenCard = null, _swipeWidth = 152, _swipeAxis = null;
function _closeSwipe() { if (_swipeOpenCard) { _swipeOpenCard.style.transform = ''; _swipeOpenCard = null; } }
document.addEventListener('touchstart', (e) => {
  // Tapping a revealed swipe action (Pin/Delete): do NOT close the swipe here —
  // otherwise the card slides back over the button and the click lands on the
  // card (opening the song) instead of the action. Let the action's click fire.
  if (e.target.closest('.sl-actions, .take-actions')) return;
  const card = e.target.closest('.sl-card, .take-card');
  if (!card) { if (_swipeOpenCard) _closeSwipe(); return; }
  if (e.target.closest('.tile, .play, .loop, .sl-del-desktop, .take-del-desktop') || e.target.closest('[contenteditable="true"]')) return;
  if (_swipeOpenCard && _swipeOpenCard !== card) _closeSwipe();
  _swipeEl = card; _swipeAxis = null;
  _swipeWidth = card.classList.contains('take-card') ? 72 : 152;
  _swipeStartX = e.touches[0].clientX; _swipeStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchmove', (e) => {
  if (!_swipeEl) return;
  const dx = e.touches[0].clientX - _swipeStartX, dy = e.touches[0].clientY - _swipeStartY;
  if (_swipeAxis === null) { if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return; _swipeAxis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y'; }
  if (_swipeAxis !== 'x') return;
  const base = (_swipeOpenCard === _swipeEl) ? -_swipeWidth : 0;
  _swipeEl.style.transform = `translateX(${Math.max(Math.min(base + dx, 0), -_swipeWidth)}px)`;
}, { passive: true });
document.addEventListener('touchend', () => {
  if (!_swipeEl) return;
  if (_swipeAxis === 'x') {
    const tx = new DOMMatrixReadOnly(getComputedStyle(_swipeEl).transform).m41;
    if (tx < -_swipeWidth / 2) { _swipeEl.style.transform = `translateX(${-_swipeWidth}px)`; _swipeOpenCard = _swipeEl; }
    else { _swipeEl.style.transform = ''; if (_swipeOpenCard === _swipeEl) _swipeOpenCard = null; }
  }
  _swipeEl = null; _swipeAxis = null;
}, { passive: true });

/* ═══════════════════════════ Dark mode ═══════════════════════════ */
function applyTheme(mode) {
  // mode: 'light' | 'dark' | 'system'
  localStorage.setItem('dh-lite-theme', mode);
  const dark = (mode === 'dark') || (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark', dark);
  document.querySelector('meta[name=theme-color]')?.setAttribute('content', dark ? '#000000' : '#f2f2f7');
}
applyTheme(localStorage.getItem('dh-lite-theme') || 'system');
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if ((localStorage.getItem('dh-lite-theme') || 'system') === 'system') applyTheme('system');
});

/* ═══════════════════════════ Boot ═══════════════════════════ */
auth.onAuthStateChanged(user => {
  if (user) {
    document.body.classList.add('signed-in');
    startSongsListener();
  } else {
    document.body.classList.remove('signed-in');
    if (_songsUnsub) { _songsUnsub(); _songsUnsub = null; }
    _songs = []; _takeCounts = {}; _songsLoaded = false;
    const _slb = document.getElementById('songListBody');
    if (_slb) _slb.innerHTML = '<div class="center-load"><div class="spinner"></div></div>';
  }
});
</script>
